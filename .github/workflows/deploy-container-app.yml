name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy-container-app.yml'
  workflow_dispatch:

env:
  ACR_NAME: ee7w6hqmzbu4ycosureg
  ACR_LOGIN_SERVER: ee7w6hqmzbu4ycosureg.azurecr.io
  IMAGE_NAME: app-ee7w6hqmzbu4y
  CONTAINER_APP_NAME: app-ee7w6hqmzbu4y
  RESOURCE_GROUP: rg-aidf-lab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update Container App env vars
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --set-env-vars \
              "FOUNDRY_ENDPOINT=${{ secrets.FOUNDRY_ENDPOINT }}" \
              "gpt_endpoint=${{ secrets.FOUNDRY_ENDPOINT }}" \
              "embedding_endpoint=${{ secrets.FOUNDRY_ENDPOINT }}" \
              "phi_4_endpoint=${{ secrets.FOUNDRY_ENDPOINT }}"
